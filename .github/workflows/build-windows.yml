name: Build Windows

on:
  push:
    tags:
      - 'v*'           # déclenché par un tag "v1.0.0", "v1.2.3", etc.
  workflow_dispatch:   # déclenchement manuel depuis l'onglet Actions

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + Electron)
        run: npm run build

      - name: Package Windows (installer + portable)
        run: npx electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # pas de signature de code

      - name: Upload installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: maKro-Compass-Setup
          path: dist/*.exe
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
