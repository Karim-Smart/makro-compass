<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#0d0404"/>
    </linearGradient>
  </defs>
  <!-- Fond -->
  <rect width="200" height="200" rx="16" fill="url(#g)"/>
  <!-- Cercle extérieur -->
  <circle cx="100" cy="95" r="75" fill="none" stroke="#FF3B3B" stroke-width="5"/>
  <!-- Étoile à 5 branches -->
  <polygon points="100,25 112,65 155,65 120,90 133,130 100,107 67,130 80,90 45,65 88,65"
           fill="none" stroke="#FF3B3B" stroke-width="3"/>
  <!-- Centre étoile -->
  <polygon points="100,55 107,75 128,75 112,87 118,107 100,95 82,107 88,87 72,75 93,75"
           fill="#FF3B3B" opacity="0.3"/>
  <!-- Texte LCS -->
  <text x="100" y="185" font-family="Arial Black, sans-serif" font-size="32" font-weight="900"
        fill="#FF3B3B" text-anchor="middle" letter-spacing="3">LCS</text>
</svg>
